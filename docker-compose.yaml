version: '3'
services:
  mysql:
    image: mysql:8.0
    container_name: xunjianbao-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请设置 MYSQL_ROOT_PASSWORD 环境变量}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xunjianbao}
      MYSQL_USER: ${MYSQL_USER:-xunjianbao}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?请设置 MYSQL_PASSWORD 环境变量}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - xunjianbao-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xunjianbao-redis
    restart: always
    command: >
      sh -c 'if [ -n "$REDIS_PASSWORD" ]; then redis-server --requirepass "$REDIS_PASSWORD"; else redis-server; fi'
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - xunjianbao-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xunjianbao-backend
    restart: always
    ports:
      - "8094:8094"
    environment:
      DATABASE_URL: ${MYSQL_USER:-xunjianbao}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE:-xunjianbao}?charset=utf8mb4&parseTime=True&loc=Local
      JWT_SECRET: ${JWT_SECRET:?请设置 JWT_SECRET 环境变量（至少32字符）}
      PORT: "8094"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OPENCLAW_URL: ${OPENCLAW_URL:-http://openclaw:8096}
      OPENCLAW_TOKEN: ${OPENCLAW_TOKEN:-}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai:8095}
      YOLO_SERVICE_URL: ${YOLO_SERVICE_URL:-http://yolo:8097}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai:
        condition: service_started
    networks:
      - xunjianbao-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8094/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  ai:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: xunjianbao-ai
    restart: always
    ports:
      - "8095:8095"
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      PORT: "8095"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-qwen-plus}
      OPENCLAW_URL: ${OPENCLAW_URL:-http://openclaw:8096}
      OPENCLAW_TOKEN: ${OPENCLAW_TOKEN:-}
    networks:
      - xunjianbao-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8095/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  yolo:
    build:
      context: ./yolo-service
      dockerfile: Dockerfile
    container_name: xunjianbao-yolo
    restart: always
    ports:
      - "8097:8097"
    environment:
      PORT: "8097"
      DEVICE: ${YOLO_DEVICE:-cpu}
    volumes:
      - yolo_models:/app/models
    networks:
      - xunjianbao-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8097/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  openclaw:
    image: openclaw/openclaw:latest
    container_name: xunjianbao-openclaw
    restart: always
    ports:
      - "8096:8096"
    environment:
      PORT: "8096"
      TOKEN: ${OPENCLAW_TOKEN:-}
    networks:
      - xunjianbao-network

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    container_name: xunjianbao-frontend
    restart: always
    ports:
      - "3000:80"
    networks:
      - xunjianbao-network

networks:
  xunjianbao-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  yolo_models:
