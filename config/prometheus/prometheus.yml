# 巡检宝Prometheus监控配置

global:
  scrape_interval: 15s  # 默认抓取间隔
  evaluation_interval: 15s  # 规则评估间隔
  external_labels:
    monitor: 'xunjianbao'
    environment: 'production'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 告警规则文件
rule_files:
  - "alerts.yml"
  - "recording_rules.yml"

# 抓取配置
scrape_configs:
  # Prometheus自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s

  # 节点监控
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
    metrics_path: /metrics

  # MySQL监控
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']
    scrape_interval: 30s
    metrics_path: /metrics
    params:
      collect[]:
        - engine_innodb_status
        - global_status
        - global_variables
        - info_schema.innodb_metrics
        - perf_schema.eventswaits
        - perf_schema.file_instances
        - perf_schema.file_summary_by_event_name
        - perf_schema.indexiowaits
        - perf_schema.tableiowaits
        - perf_schema.tablelocks

  # Redis监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s
    metrics_path: /metrics
    params:
      check-keys: '*'

  # 后端服务监控
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8094']
    scrape_interval: 15s
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # AI服务监控
  - job_name: 'ai-service'
    static_configs:
      - targets: ['ai:8095']
    scrape_interval: 15s
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # YOLO服务监控
  - job_name: 'yolo-service'
    static_configs:
      - targets: ['yolo:8097']
    scrape_interval: 15s
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # 前端服务监控
  - job_name: 'frontend'
    static_configs:
      - targets: ['frontend:80']
    scrape_interval: 15s
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # Docker容器监控
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s
    metrics_path: /metrics

  # Nginx监控
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
    scrape_interval: 30s
    metrics_path: /metrics

  # 黑盒监控（外部健康检查）
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://frontend:80  # 前端健康检查
        - http://backend:8094/health  # 后端健康检查
        - http://ai:8095/health  # AI服务健康检查
        - http://yolo:8097/health  # YOLO服务健康检查
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115  # 黑盒导出器地址

# 远程写入配置（可选，用于长期存储）
remote_write:
  - url: "http://thanos-receive:10908/api/v1/receive"
    write_relabel_configs:
      - source_labels: [__name__]
        regex: 'ALERTS|ALERTS_FOR_STATE'
        action: drop

# 远程读取配置（可选）
remote_read:
  - url: "http://thanos-query:10902/api/v1/read"