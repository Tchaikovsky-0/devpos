# 巡检宝告警规则配置

groups:
  # 系统级别告警
  - name: system_alerts
    rules:
      # 节点宕机
      - alert: NodeDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
          environment: production
        annotations:
          summary: "节点 {{ $labels.instance }} 宕机"
          description: "{{ $labels.instance }} 已经超过2分钟无法访问"
          runbook_url: "https://wiki.your-company.com/runbooks/node-down"

      # 高CPU使用率
      - alert: HighCpuUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          environment: production
        annotations:
          summary: "高CPU使用率 - {{ $labels.instance }}"
          description: "{{ $labels.instance }} 的CPU使用率超过80%已持续5分钟，当前值: {{ $value }}%"
          runbook_url: "https://wiki.your-company.com/runbooks/high-cpu"

      # 高内存使用率
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
          environment: production
        annotations:
          summary: "高内存使用率 - {{ $labels.instance }}"
          description: "{{ $labels.instance }} 的内存使用率超过85%已持续5分钟，当前值: {{ $value }}%"
          runbook_url: "https://wiki.your-company.com/runbooks/high-memory"

      # 磁盘空间不足
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100) < 15
        for: 10m
        labels:
          severity: warning
          environment: production
        annotations:
          summary: "磁盘空间不足 - {{ $labels.instance }}"
          description: "{{ $labels.instance }} 的根目录磁盘空间不足15%，当前可用空间: {{ $value }}%"
          runbook_url: "https://wiki.your-company.com/runbooks/low-disk-space"

  # 数据库告警
  - name: database_alerts
    rules:
      # MySQL连接数过高
      - alert: HighMySQLConnections
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections * 100 > 80
        for: 5m
        labels:
          severity: warning
          environment: production
          service: mysql
        annotations:
          summary: "高MySQL连接数"
          description: "MySQL连接数超过最大连接数的80%，当前值: {{ $value }}%"
          runbook_url: "https://wiki.your-company.com/runbooks/mysql-high-connections"

      # MySQL慢查询
      - alert: MySQLSlowQueries
        expr: rate(mysql_global_status_slow_queries[5m]) > 10
        for: 2m
        labels:
          severity: warning
          environment: production
          service: mysql
        annotations:
          summary: "MySQL慢查询过多"
          description: "MySQL慢查询速率超过10次/分钟，当前值: {{ $value }}"
          runbook_url: "https://wiki.your-company.com/runbooks/mysql-slow-queries"

      # Redis内存使用率高
      - alert: HighRedisMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
          environment: production
          service: redis
        annotations:
          summary: "高Redis内存使用率"
          description: "Redis内存使用率超过85%，当前值: {{ $value }}%"
          runbook_url: "https://wiki.your-company.com/runbooks/redis-high-memory"

      # Redis连接数过高
      - alert: HighRedisConnections
        expr: redis_connected_clients > 100
        for: 5m
        labels:
          severity: warning
          environment: production
          service: redis
        annotations:
          summary: "高Redis连接数"
          description: "Redis连接数超过100，当前值: {{ $value }}"
          runbook_url: "https://wiki.your-company.com/runbooks/redis-high-connections"

  # 应用服务告警
  - name: application_alerts
    rules:
      # 服务宕机
      - alert: ServiceDown
        expr: up{job=~"backend|ai-service|yolo-service|frontend"} == 0
        for: 1m
        labels:
          severity: critical
          environment: production
        annotations:
          summary: "服务宕机 - {{ $labels.job }}"
          description: "{{ $labels.job }} 服务已经超过1分钟无法访问"
          runbook_url: "https://wiki.your-company.com/runbooks/service-down"

      # 高HTTP错误率
      - alert: HighHttpErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) * 100 > 5
        for: 2m
        labels:
          severity: warning
          environment: production
        annotations:
          summary: "高HTTP错误率 - {{ $labels.job }}"
          description: "{{ $labels.job }} 的HTTP 5xx错误率超过5%，当前值: {{ $value }}%"
          runbook_url: "https://wiki.your-company.com/runbooks/high-http-error-rate"

      # 高响应时间
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          environment: production
        annotations:
          summary: "高响应时间 - {{ $labels.job }}"
          description: "{{ $labels.job }} 的95百分位响应时间超过2秒，当前值: {{ $value }}秒"
          runbook_url: "https://wiki.your-company.com/runbooks/high-response-time"

      # 低请求速率（可能表示服务有问题）
      - alert: LowRequestRate
        expr: rate(http_requests_total[5m]) < 0.1
        for: 10m
        labels:
          severity: warning
          environment: production
        annotations:
          summary: "低请求速率 - {{ $labels.job }}"
          description: "{{ $labels.job }} 的请求速率低于0.1请求/秒已持续10分钟"
          runbook_url: "https://wiki.your-company.com/runbooks/low-request-rate"

  # 业务指标告警
  - name: business_alerts
    rules:
      # AI服务推理失败率高
      - alert: HighAiInferenceFailureRate
        expr: rate(ai_inference_errors_total[5m]) / rate(ai_inference_requests_total[5m]) * 100 > 10
        for: 2m
        labels:
          severity: warning
          environment: production
          service: ai
        annotations:
          summary: "高AI推理失败率"
          description: "AI服务推理失败率超过10%，当前值: {{ $value }}%"
          runbook_url: "https://wiki.your-company.com/runbooks/ai-high-failure-rate"

      # YOLO服务检测失败率高
      - alert: HighYoloDetectionFailureRate
        expr: rate(yolo_detection_errors_total[5m]) / rate(yolo_detection_requests_total[5m]) * 100 > 10
        for: 2m
        labels:
          severity: warning
          environment: production
          service: yolo
        annotations:
          summary: "高YOLO检测失败率"
          description: "YOLO服务检测失败率超过10%，当前值: {{ $value }}%"
          runbook_url: "https://wiki.your-company.com/runbooks/yolo-high-failure-rate"

      # 用户活跃度下降
      - alert: UserActivityDrop
        expr: derivative(active_users_count[1h]) < -10
        for: 30m
        labels:
          severity: warning
          environment: production
        annotations:
          summary: "用户活跃度下降"
          description: "用户活跃度在30分钟内下降超过10个用户"
          runbook_url: "https://wiki.your-company.com/runbooks/user-activity-drop"

  # 容器和编排告警
  - name: container_alerts
    rules:
      # 容器重启频繁
      - alert: ContainerFrequentRestarts
        expr: changes(container_last_seen{name!~".*prometheus.*|.*grafana.*"}[15m]) > 3
        for: 5m
        labels:
          severity: warning
          environment: production
        annotations:
          summary: "容器频繁重启 - {{ $labels.name }}"
          description: "容器 {{ $labels.name }} 在过去15分钟内重启超过3次"
          runbook_url: "https://wiki.your-company.com/runbooks/container-restarts"

      # 容器内存使用率高
      - alert: ContainerHighMemoryUsage
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes * 100 > 90
        for: 5m
        labels:
          severity: warning
          environment: production
        annotations:
          summary: "容器高内存使用率 - {{ $labels.name }}"
          description: "容器 {{ $labels.name }} 内存使用率超过90%，当前值: {{ $value }}%"
          runbook_url: "https://wiki.your-company.com/runbooks/container-high-memory"

      # 容器CPU使用率高
      - alert: ContainerHighCpuUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
          environment: production
        annotations:
          summary: "容器高CPU使用率 - {{ $labels.name }}"
          description: "容器 {{ $labels.name }} CPU使用率超过80%，当前值: {{ $value }}%"
          runbook_url: "https://wiki.your-company.com/runbooks/container-high-cpu"

  # 紧急告警（需要立即处理）
  - name: emergency_alerts
    rules:
      # 数据库完全无法访问
      - alert: DatabaseUnavailable
        expr: up{job=~"mysql|redis"} == 0
        for: 30s
        labels:
          severity: critical
          environment: production
        annotations:
          summary: "数据库不可用"
          description: "数据库服务完全无法访问，需要立即处理"
          runbook_url: "https://wiki.your-company.com/runbooks/database-unavailable"

      # 所有后端服务宕机
      - alert: AllBackendServicesDown
        expr: sum(up{job=~"backend|ai-service|yolo-service"}) == 0
        for: 1m
        labels:
          severity: critical
          environment: production
        annotations:
          summary: "所有后端服务宕机"
          description: "所有后端服务都无法访问，系统完全不可用"
          runbook_url: "https://wiki.your-company.com/runbooks/all-backend-down"

      # 前端完全不可用
      - alert: FrontendUnavailable
        expr: up{job="frontend"} == 0
        for: 1m
        labels:
          severity: critical
          environment: production
        annotations:
          summary: "前端服务不可用"
          description: "前端服务完全无法访问，用户无法使用系统"
          runbook_url: "https://wiki.your-company.com/runbooks/frontend-unavailable"

      # 磁盘写满
      - alert: DiskFull
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100) < 5
        for: 2m
        labels:
          severity: critical
          environment: production
        annotations:
          summary: "磁盘即将写满"
          description: "根目录磁盘空间不足5%，需要立即清理"
          runbook_url: "https://wiki.your-company.com/runbooks/disk-full"

# 告警分组和抑制规则
alertmanager_config:
  route:
    group_by: ['alertname', 'severity', 'environment']
    group_wait: 10s
    group_interval: 10s
    repeat_interval: 1h
    receiver: 'default'
    routes:
      - match:
          severity: critical
        receiver: 'critical-alerts'
        group_wait: 5s
        group_interval: 5s
        repeat_interval: 30m
      - match:
          severity: warning
        receiver: 'warning-alerts'
        group_wait: 30s
        group_interval: 30s
        repeat_interval: 2h
      - match:
          environment: production
        receiver: 'production-alerts'

  inhibit_rules:
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'instance']