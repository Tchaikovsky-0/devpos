# 巡检宝 - 数据库服务Docker Compose配置
# 版本: v1.0.0
# 更新时间: 2026-04-08
# 包含: PostgreSQL, Redis, MinIO

version: '3.8'

services:
  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: xunjianbao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: xunjianbao
      POSTGRES_USER: xunjianbao
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ChangeMe123!}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./logs/postgres:/var/log/postgresql
    ports:
      - "5432:5432"
    networks:
      - xunjianbao-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xunjianbao -d xunjianbao"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=512MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - wal_buffers=16MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - work_mem=4MB
      - -c
      - min_wal_size=1GB
      - -c
      - max_wal_size=4GB
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ============================================
  # Redis 缓存
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: xunjianbao-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10 --save 60 10000
    volumes:
      - redis_data:/data
      - ./logs/redis:/var/log/redis
    ports:
      - "6379:6379"
    networks:
      - xunjianbao-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ============================================
  # MinIO 对象存储
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: xunjianbao-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-ChangeMe456!}
      MINIO_DEFAULT_BUCKETS: xunjianbao
    volumes:
      - minio_data:/data
      - ./logs/minio:/var/log/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - xunjianbao-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

# ============================================
# 网络配置
# ============================================
networks:
  xunjianbao-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

# ============================================
# 数据卷配置
# ============================================
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/xunjianbao/data/postgres

  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/xunjianbao/data/redis

  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/xunjianbao/data/minio
