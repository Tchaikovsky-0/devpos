# Air 配置文件 - Go 热加载
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # 要构建和运行的命令
  cmd = "go build -o ./tmp/main ./cmd/server"
  
  # 运行的二进制文件
  bin = "./tmp/main"
  
  # 要监听的文件后缀
  include_ext = ["go", "tpl", "tmpl", "html"]
  
  # 排除的目录
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "docs", "migrations"]
  
  # 排除的文件
  exclude_file = []
  
  # 排除的正则表达式
  exclude_regex = ["_test.go"]
  
  # 排除不变的目录
  exclude_unchanged = true
  
  # 监听的目录（空表示监听所有）
  include_dir = []
  
  # 监听的文件（空表示监听所有）
  include_file = []
  
  # 延迟触发构建（毫秒）
  delay = 1000
  
  # 发送中断信号后等待时间（毫秒）
  kill_delay = "2s"
  
  # 日志文件
  log = "build-errors.log"
  
  # 轮询监听（某些系统不支持 fsnotify）
  poll = false
  
  # 轮询间隔
  poll_interval = 0

[log]
  # 显示日志时间
  time = true
  
  # 只显示主日志
  main_only = false

[color]
  # 自定义颜色
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # 退出时清理临时目录
  clean_on_exit = true
