# 巡检宝 - 综合测试 CI 工作流
# 包含: 单元测试、集成测试、E2E测试、覆盖率报告

name: Comprehensive Testing CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'ai-service/**'
      - 'yolo-service/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-testing-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.10'
  PNPM_VERSION: '9'

jobs:
  # ============================================================================
  # 前端: 单元测试 + 集成测试 + 覆盖率
  # ============================================================================
  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Unit Tests
        run: pnpm test:run --reporter=verbose
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/test-results/
          retention-days: 7

      - name: Generate Test Report
        if: always()
        run: |
          echo "## Frontend Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Tests completed. Check artifacts for detailed results." >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # 前端: 集成测试
  # ============================================================================
  frontend-integration-tests:
    name: Frontend Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Integration Tests
        run: pnpm test:run tests/integration --reporter=verbose
        continue-on-error: true

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-integration-test-results
          path: frontend/test-results/
          retention-days: 7

  # ============================================================================
  # 前端: 覆盖率报告
  # ============================================================================
  frontend-coverage:
    name: Frontend Coverage Report
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tests with Coverage
        run: |
          pnpm test:run --coverage --coverage.reporter=json --coverage.reporter=text --coverage.reporter=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 30

      - name: Generate Coverage Summary
        run: |
          if [ -f coverage/coverage-final.json ]; then
            echo "## Frontend Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat coverage/coverage-final.json | jq '.total' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================================
  # 后端: 单元测试 + 集成测试
  # ============================================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root_password
          MYSQL_DATABASE: xunjianbao_test
          MYSQL_USER: xunjianbao_test
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Run Unit Tests
        run: |
          go test -v -race \
            -coverprofile=coverage/unit.out \
            -covermode=atomic \
            ./internal/service/... \
            ./internal/handler/... \
            ./pkg/...

      - name: Run Integration Tests
        run: |
          go test -v -race \
            -coverprofile=coverage/integration.out \
            -covermode=atomic \
            ./tests/...

      - name: Merge Coverage
        run: |
          mkdir -p coverage
          if [ -f coverage/unit.out ] && [ -f coverage/integration.out ]; then
            echo "mode: atomic" > coverage/coverage.out
            grep -v "^mode:" coverage/unit.out >> coverage/coverage.out || true
            grep -v "^mode:" coverage/integration.out >> coverage/coverage.out || true
          fi

      - name: Generate Coverage Report
        run: |
          go tool cover -html=coverage/coverage.out -o=coverage/coverage.html
          go tool cover -func=coverage/coverage.out -o=coverage/coverage.txt

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 30

      - name: Generate Test Summary
        run: |
          echo "## Backend Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "Coverage: $(go tool cover -func=coverage/coverage.out | grep total | awk '{print $3}')" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # E2E 测试 (Playwright)
  # ============================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build Frontend
        run: pnpm build
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Start Backend (for E2E tests)
        run: |
          cd ../backend
          go build -o server ./cmd/server
          ./server &
          sleep 5

      - name: Run E2E Tests
        run: |
          pnpm exec playwright test --reporter=list --project=chromium
        continue-on-error: true

      - name: Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright Traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 14

      - name: Generate E2E Summary
        run: |
          echo "## E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "Results available in artifacts." >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # 测试总结报告
  # ============================================================================
  test-summary:
    name: Test Summary
    if: always()
    runs-on: ubuntu-latest
    needs: [frontend-unit-tests, frontend-integration-tests, frontend-coverage, backend-tests, e2e-tests]

    steps:
      - name: Generate Summary Report
        run: |
          echo "# 🧪 Test Summary Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Unit Tests | ${{ needs.frontend-unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Integration Tests | ${{ needs.frontend-integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Coverage | ${{ needs.frontend-coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.backend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Test Results: frontend-test-results" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Coverage: frontend-coverage" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Coverage: backend-coverage" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Test Results: e2e-test-results" >> $GITHUB_STEP_SUMMARY

      - name: Check Overall Status
        run: |
          if [[ "${{ needs.frontend-unit-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.backend-tests.result }}" == "failure" ]]; then
            echo "::error::Critical tests failed. Please review the test results."
            exit 1
          fi
          echo "✅ All critical tests passed!"

  # ============================================================================
  # 质量门禁检查
  # ============================================================================
  quality-gate:
    name: Quality Gate
    if: always()
    runs-on: ubuntu-latest
    needs: [frontend-coverage, backend-tests]

    steps:
      - name: Download Frontend Coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend-coverage

      - name: Download Backend Coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend-coverage

      - name: Check Coverage Thresholds
        run: |
          echo "## Quality Gate Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check frontend coverage
          if [ -f backend-coverage/coverage.txt ]; then
            BACKEND_COVERAGE=$(grep total backend-coverage/coverage.txt | awk '{print $3}' | sed 's/%//')
            echo "Backend Coverage: ${BACKEND_COVERAGE}%" >> $GITHUB_STEP_SUMMARY

            if (( $(echo "$BACKEND_COVERAGE < 60" | bc -l) )); then
              echo "❌ Backend coverage below minimum threshold (60%)"
              exit 1
            fi
          fi

          echo "✅ Quality gate passed!" >> $GITHUB_STEP_SUMMARY
