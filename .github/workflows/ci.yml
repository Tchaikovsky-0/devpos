# 巡检宝 CI 工作流
# 触发条件: push / PR 到 main / develop 分支
# 执行: lint → test → build（前端 + 后端 + AI 服务）

name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'ai-service/**'
      - 'yolo-service/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.10'
  PNPM_VERSION: '9'

jobs:
  # ============================================================================
  # 前端: lint + test + build
  # ============================================================================
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Type check & Build
        run: pnpm build
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ============================================================================
  # 后端: vet + build + test
  # ============================================================================
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root_password
          MYSQL_DATABASE: xunjianbao_test
          MYSQL_USER: xunjianbao_test
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o server ./cmd/server

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...
        env:
          DATABASE_URL: xunjianbao_test:test_password@tcp(localhost:3306)/xunjianbao_test?charset=utf8mb4&parseTime=True&loc=Local
          JWT_SECRET: ci-test-jwt-secret-must-be-at-least-32-characters
          PORT: '8094'
          REDIS_URL: redis://localhost:6379
        continue-on-error: true  # 当前无测试文件，允许跳过

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 7

  # ============================================================================
  # AI 服务: lint + 语法检查
  # ============================================================================
  ai-service:
    name: AI Service CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check app/ --output-format=github
        continue-on-error: true

      - name: Import check
        run: python -c "from app.main import app; print('Import OK')"

  # ============================================================================
  # YOLO 服务: lint + 单元测试
  # ============================================================================
  yolo-service:
    name: YOLO Service CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yolo-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: yolo-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint (ruff)
        run: ruff check app/ tests/ --output-format=github
        continue-on-error: true

      - name: Test
        run: pytest tests/ -v --tb=short
        continue-on-error: true  # 测试需要 YOLO 模型文件，CI 中可能跳过

  # ============================================================================
  # 汇总状态
  # ============================================================================
  ci-status:
    name: CI Status
    if: always()
    runs-on: ubuntu-latest
    needs: [frontend, backend, ai-service, yolo-service]
    steps:
      - name: Check CI results
        run: |
          echo "Frontend:  ${{ needs.frontend.result }}"
          echo "Backend:   ${{ needs.backend.result }}"
          echo "AI Service: ${{ needs.ai-service.result }}"
          echo "YOLO Service: ${{ needs.yolo-service.result }}"
          if [[ "${{ needs.frontend.result }}" == "failure" ]] || \
             [[ "${{ needs.backend.result }}" == "failure" ]]; then
            echo "::error::CI pipeline failed"
            exit 1
          fi
          echo "CI passed!"
