# 巡检宝部署工作流
# 触发条件: 推送 tag (v*) 或手动触发
# 前置: 需要 Docker Build 工作流完成
# 部署: SSH 到目标服务器，docker-compose 拉取镜像并启动

name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip CI checks'
        required: false
        default: false
        type: boolean

# 仅允许一次部署
concurrency:
  group: deploy-${{ inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  COMPOSE_FILE: docker-compose.yaml

jobs:
  # ============================================================================
  # 前置检查: 确保 CI 通过
  # ============================================================================
  pre-check:
    name: Pre-deploy Check
    runs-on: ubuntu-latest
    if: inputs.skip_tests != true
    needs: []
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run quick CI checks
        run: |
          # 前端构建检查
          cd frontend
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm install --frozen-lockfile
          pnpm build || { echo "::error::Frontend build failed"; exit 1; }
          echo "Frontend build OK"

          # 后端编译检查
          cd ../backend
          go vet ./... || { echo "::error::Backend vet failed"; exit 1; }
          go build -o /dev/null ./cmd/server || { echo "::error::Backend build failed"; exit 1; }
          echo "Backend build OK"

  # ============================================================================
  # 部署到目标服务器
  # ============================================================================
  deploy:
    name: Deploy (${{ inputs.environment || 'production' }})
    runs-on: ubuntu-latest
    needs: [pre-check]
    if: always() && (needs.pre-check.result == 'success' || needs.pre-check.result == 'skipped')
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi
          echo "Deploying version: $(cat $GITHUB_OUTPUT | grep VERSION)"

      # === 方式 A: SSH 直接部署 (适用于自有服务器) ===
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail

            # 进入部署目录
            cd /opt/xunjianbao || { echo "Deploy directory not found"; exit 1; }

            # 拉取最新代码
            git pull origin main

            # 拉取最新镜像
            export GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin 2>/dev/null || true

            # 如果有 GHCR 镜像，使用镜像部署
            if docker pull ghcr.io/${{ github.repository }}/frontend:${{ steps.version.outputs.VERSION }} 2>/dev/null; then
              echo "Using pre-built images"
            else
              echo "Building images on server..."
            fi

            # 停止旧服务
            docker compose down --timeout 30 || true

            # 启动新服务
            docker compose up -d --build --force-recreate

            # 等待服务启动
            echo "Waiting for services to start..."
            sleep 10

            # 健康检查
            echo "Running health checks..."

            # 检查后端
            if curl -sf http://localhost:8094/health > /dev/null 2>&1; then
              echo "Backend: OK"
            else
              echo "Backend: FAILED (will retry)"
              sleep 5
              curl -sf http://localhost:8094/health > /dev/null 2>&1 || echo "Backend: still failing"
            fi

            # 检查 AI 服务
            if curl -sf http://localhost:8095/health > /dev/null 2>&1; then
              echo "AI Service: OK"
            else
              echo "AI Service: FAILED"
            fi

            # 检查前端
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend: OK"
            else
              echo "Frontend: FAILED"
            fi

            # 清理旧镜像
            docker image prune -f
            echo "Deploy complete!"

      # === 方式 B: Docker Compose 部署到 Docker Host (备选) ===
      # 如果使用 Docker Host 直接部署，取消下面的注释
      # - name: Deploy to Docker Host
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key: ${{ secrets.DEPLOY_SSH_KEY }}
      #     port: ${{ secrets.DEPLOY_PORT || 22 }}
      #     script: |
      #       cd /opt/xunjianbao
      #       docker compose down --timeout 30 || true
      #       docker compose up -d --build --force-recreate
      #       docker image prune -f

      - name: Notify deployment
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "Deploy SUCCESS: ${{ steps.version.outputs.VERSION }} to ${{ inputs.environment || 'production' }}"
          else
            echo "Deploy FAILED: ${{ job.status }}"
          fi
