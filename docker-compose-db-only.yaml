# 只运行数据库和Redis的docker-compose配置
# 用于混合开发模式：MySQL+Redis在Docker，其他服务在本地运行

version: '3.8'

services:
  # 数据库服务
  mysql:
    image: mysql:8.0
    container_name: xunjianbao-mysql-dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_change_me
      MYSQL_DATABASE: xunjianbao
      MYSQL_USER: xunjianbao
      MYSQL_PASSWORD: change_password
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
    networks:
      - xunjianbao-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xunjianbao-redis-dev
    restart: always
    command: redis-server --requirepass ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - xunjianbao-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  xunjianbao-network:
    driver: bridge

volumes:
  mysql_data_dev:
  redis_data_dev:
